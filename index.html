<!DOCTYPE html>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ffe6f0, #e6f7ff);
    margin: 0;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 90%;
    max-width: 800px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #ff1493;
}

input, button {
    display: block;
    margin: 10px auto;
    padding: 10px;
    font-size: 16px;
}

button {
    background: #ff1493;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.photos {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.photos img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid #ddd;
}

video {
    display: block;
    margin: 10px auto;
    border-radius: 10px;
}

.message {
    margin-top: 10px;
    line-height: 1.6;
}

.gift {
    margin-top: 15px;
    padding: 10px;
    background: #fff3cd;
    border-left: 5px solid #ff9800;
    white-space: pre-line;
}
</style>

</head>

function unlock() {
    const dob = document.getElementById("dobInput").value;
    const msg = document.getElementById("msg");
    const app = document.getElementById("app");
    const loginBox = document.getElementById("loginBox");

    app.innerHTML = "";

    if (friends[dob]) {
        const f = friends[dob];

        loginBox.style.display = "none";

        app.innerHTML = `
        <div class="card">
            <h2>${f.name}</h2>

            <div class="photos">
                ${f.photos.map(p => `<img src="${p}">`).join("")}
            </div>

            <video width="300" controls>
                <source src="${f.video}" type="video/mp4">
            </video>

            <div class="message">
                ${f.message}
            </div>

            <div class="gift">
                ${f.gift}
            </div>
        </div>
        `;
    } else {
        msg.innerHTML = "❌ No surprise found for this DOB";
